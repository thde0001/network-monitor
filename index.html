<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #1a1a2e; color: #eee; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .card-header { background-color: #0f3460; color: #e94560; font-weight: bold; }
        .table { color: #eee; }
        .table thead { color: #e94560; }
    </style>
</head>
<body>
    <div class="container-fluid p-4">

        <h1 class="text-center mb-4" style="color: #e94560;">
            Network Monitor Dashboard
        </h1>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Pakker over tid (sidste 10 minutter)</div>
                    <div class="card-body">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Top 5 mest aktive IP-adresser</div>
                    <div class="card-body">
                        <canvas id="ipChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Enheder på netværket</div>
            <div class="card-body">
                <table class="table table-dark table-striped table-sm">
                    <thead>
                        <tr>
                            <th>IP</th>
                            <th>MAC</th>
                            <th>Hostname</th>
                            <th>Først set</th>
                            <th>Sidst set</th>
                        </tr>
                    </thead>
                    <tbody id="devices-table">
                        <tr><td colspan="5">Indlæser...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Alarmer</div>
            <div class="card-body">
                <table class="table table-dark table-striped table-sm">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Kilde IP</th>
                            <th>Detaljer</th>
                            <th>Tidspunkt</th>
                        </tr>
                    </thead>
                    <tbody id="alerts-table">
                        <tr><td colspan="4">Indlæser...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Seneste trafik</div>
            <div class="card-body">
                <table class="table table-dark table-striped table-sm">
                    <thead>
                        <tr>
                            <th>Protokol</th>
                            <th>Kilde</th>
                            <th>Destination</th>
                            <th>Tidspunkt</th>
                        </tr>
                    </thead>
                    <tbody id="traffic-table">
                        <tr><td colspan="4">Indlæser...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        var trafficChart = new Chart(document.getElementById('trafficChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Pakker per minut',
                    data: [],
                    borderColor: '#e94560',
                    backgroundColor: 'rgba(233,69,96,0.2)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#eee' } } },
                scales: {
                    x: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } },
                    y: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } }
                }
            }
        });

        var ipChart = new Chart(document.getElementById('ipChart'), {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Antal pakker',
                    data: [],
                    backgroundColor: [
                        '#e94560', '#0f3460', '#f5a623', '#16213e', '#4ecca3'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#eee' } } },
                scales: {
                    x: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } },
                    y: { ticks: { color: '#eee' }, grid: { color: '#0f3460' } }
                }
            }
        });

        function updateTrafficChart() {
            fetch('/api/traffic_per_minute')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var labels = data.map(function(d) { return d.minute.substring(11, 16); });
                    var values = data.map(function(d) { return d.count; });
                    trafficChart.data.labels = labels;
                    trafficChart.data.datasets[0].data = values;
                    trafficChart.update();
                });
        }

        function updateIpChart(trafficData) {
            var ipCounts = {};
            for (var i = 0; i < trafficData.length; i++) {
                var ip = trafficData[i].src_ip;
                ipCounts[ip] = (ipCounts[ip] || 0) + 1;
            }
            var sorted = Object.entries(ipCounts)
                .sort(function(a, b) { return b[1] - a[1]; })
                .slice(0, 5);

            ipChart.data.labels = sorted.map(function(x) { return x[0]; });
            ipChart.data.datasets[0].data = sorted.map(function(x) { return x[1]; });
            ipChart.update();
        }

        function loadDevices() {
            fetch('/api/devices')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var tbody = document.getElementById('devices-table');
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5">Ingen enheder fundet</td></tr>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < data.length; i++) {
                        var d = data[i];
                        html += '<tr>';
                        html += '<td>' + d.ip + '</td>';
                        html += '<td>' + d.mac + '</td>';
                        html += '<td>' + (d.hostname || 'Ukendt') + '</td>';
                        html += '<td>' + d.first_seen + '</td>';
                        html += '<td>' + d.last_seen + '</td>';
                        html += '</tr>';
                    }
                    tbody.innerHTML = html;
                });
        }

        function loadAlerts() {
            fetch('/api/alerts')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var tbody = document.getElementById('alerts-table');
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4">Ingen alarmer</td></tr>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < data.length; i++) {
                        var a = data[i];
                        var color = a.alert_type === 'PORTSCAN' ? '#e94560' : '#f5a623';
                        html += '<tr>';
                        html += '<td><span style="background:' + color + ';padding:3px 8px;border-radius:4px;">' + a.alert_type + '</span></td>';
                        html += '<td>' + a.src_ip + '</td>';
                        html += '<td>' + a.details + '</td>';
                        html += '<td>' + a.timestamp + '</td>';
                        html += '</tr>';
                    }
                    tbody.innerHTML = html;
                });
        }

        function loadTraffic() {
            fetch('/api/traffic')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var tbody = document.getElementById('traffic-table');
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4">Ingen trafik</td></tr>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < data.length; i++) {
                        var t = data[i];
                        html += '<tr>';
                        html += '<td>' + t.protocol + '</td>';
                        html += '<td>' + t.src_ip + ':' + t.src_port + '</td>';
                        html += '<td>' + t.dst_ip + ':' + t.dst_port + '</td>';
                        html += '<td>' + t.timestamp + '</td>';
                        html += '</tr>';
                    }
                    tbody.innerHTML = html;
                    updateIpChart(data);
                });
        }

        loadDevices();
        loadAlerts();
        loadTraffic();
        updateTrafficChart();

        setInterval(function() {
            loadDevices();
            loadAlerts();
            loadTraffic();
            updateTrafficChart();
        }, 10000);
    </script>

</body>
</html>
